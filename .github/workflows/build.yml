name: Build The Rage

on:
  push:
    branches: [ forge-1.20.1 ]
  pull_request:
    branches: [ forge-1.20.1 ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle Executable
        run: chmod +x gradlew

      - name: Build Mod
        run: ./gradlew build

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: TheRage-JAR
          path: build/libs/*.jar
